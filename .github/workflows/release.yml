name: Android Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build Debug APK
      # Since the gradlew wrapper isn't committed in your repository,
      # we can just use the pre-installed system gradle on GitHub Actions!
      run: gradle assembleDebug

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Automatic Build #${{ github.run_number }}
        body: "Automated APK build generated from the main branch."
        files: app/build/outputs/apk/debug/app-debug.apk
